<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIRS Connect | Register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="index.html" class="logo">
        <div class="logo-icon">TT</div>
        <span class="logo-text">LIRS<span>Connect</span></span>
      </a>
      <div class="nav-right">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </nav>

    <!-- PAGE -->
    <div class="page-wrapper">
      <div class="card">
        <div class="card-header">
          <div class="card-icon">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4">
              <circle cx="8.5" cy="7" r="3.5" />
              <path d="M2 17c0-3.3 2.9-6 6.5-6s6.5 2.7 6.5 6" />
              <path d="M16 6.5v4M14 8.5h4" />
            </svg>
          </div>
          <h1>Create Your Account</h1>
          <p>
            Register to file and track your tax complaints with LIRS Connect.
          </p>
        </div>

        <form onsubmit="handleSubmit(event)">
          <div class="section-divider">Personal Information</div>

          <div class="form-row">
            <div class="form-group">
              <label for="fname">First Name</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                    <circle cx="10" cy="7" r="3.5" />
                    <path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" />
                  </svg>
                </span>
                <input type="text" id="fname" placeholder="John" required />
              </div>
            </div>
            <div class="form-group">
              <label for="lname">Last Name</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                    <circle cx="10" cy="7" r="3.5" />
                    <path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" />
                  </svg>
                </span>
                <input type="text" id="lname" placeholder="Doe" required />
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="PayID">PayID</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="2" y="4" width="16" height="12" rx="2" />
                  <circle cx="7" cy="10" r="1.8" />
                  <path d="M11 8.5h5M11 11.5h5" />
                </svg>
              </span>
              <input type="text" id="PayID" placeholder="N-123456" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="2" y="4" width="16" height="12" rx="2" />
                  <path d="m2.5 5 7.5 6 7.5-6" />
                </svg>
              </span>
              <input
                type="email"
                id="email"
                placeholder="john@example.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M6.8 3.5c.5 0 1 .3 1.2.8l.7 1.7a1.3 1.3 0 0 1-.3 1.4l-.9.9c.6 1.5 1.8 2.7 3.3 3.3l.9-.9a1.3 1.3 0 0 1 1.4-.3l1.7.7c.5.2.8.7.8 1.2v1.5c0 .8-.7 1.5-1.5 1.4-5.4-.6-9.7-4.9-10.3-10.3-.1-.8.6-1.5 1.4-1.5h1.5z" />
                </svg>
              </span>
              <input
                type="tel"
                id="phone"
                placeholder="+234 800 000 0000"
                required
              />
            </div>
          </div>

          <div class="section-divider">Tax Information</div>

          <div class="form-group">
            <label for="tin">Tax Identification Number (TIN)</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="2" y="4" width="16" height="12" rx="2" />
                  <circle cx="7" cy="10" r="1.8" />
                  <path d="M11 8.5h5M11 11.5h5M4.5 14.5c.5-1.6 1.7-2.3 2.5-2.3s2 .7 2.5 2.3" />
                </svg>
              </span>
              <input
                type="text"
                id="tin"
                placeholder="e.g. 1234567890"
                required
                maxlength="14"
              />
            </div>
            <div class="form-hint">
              Your TIN is issued by the Federal Inland Revenue Service (FIRS).
            </div>
          </div>

          <div class="section-divider">Security</div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="4.5" y="9" width="11" height="8" rx="1.5" />
                  <path d="M6.5 9V6.5a3.5 3.5 0 0 1 7 0V9" />
                </svg>
              </span>
              <input
                type="password"
                id="password"
                placeholder="Create a strong password"
                required
                oninput="checkStrength(this.value)"
              />
              <button
                type="button"
                class="toggle-pw"
                onclick="togglePw('password', this)"
              >
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="17" height="17">
                  <path d="M2 10s3-5.5 8-5.5S18 10 18 10s-3 5.5-8 5.5S2 10 2 10z" />
                  <circle cx="10" cy="10" r="2.3" />
                </svg>
              </button>
            </div>
            <div class="strength-wrap">
              <div class="strength-bar">
                <div class="strength-fill" id="strength-fill"></div>
              </div>
              <div class="strength-label" id="strength-label">
                Enter a password
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="4.5" y="9" width="11" height="8" rx="1.5" />
                  <path d="M6.5 9V6.5a3.5 3.5 0 0 1 7 0V9" />
                </svg>
              </span>
              <input
                type="password"
                id="confirm-password"
                placeholder="Re-enter your password"
                required
              />
              <button
                type="button"
                class="toggle-pw"
                onclick="togglePw('confirm-password', this)"
              >
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="17" height="17">
                  <path d="M2 10s3-5.5 8-5.5S18 10 18 10s-3 5.5-8 5.5S2 10 2 10z" />
                  <circle cx="10" cy="10" r="2.3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="terms-row">
            <input type="checkbox" id="terms" required />
            <label for="terms">
              I agree to the <a href="#">Terms of Use</a> and
              <a href="#">Privacy Policy</a> of LIRS Connect. I confirm that the
              information provided is accurate.
            </label>
          </div>

          <button type="submit" class="btn-submit">Create Account →</button>
        </form>

        <div class="trust-strip">
          <div class="trust-item">SSL Secured</div>
          <div class="trust-item">Gov.</div>
        </div>
      </div>
    </div>

    <script>
      var EYE_OPEN =
        '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="17" height="17"><path d="M2 10s3-5.5 8-5.5S18 10 18 10s-3 5.5-8 5.5S2 10 2 10z"/><circle cx="10" cy="10" r="2.3"/></svg>';
      var EYE_CLOSED =
        '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="17" height="17"><path d="M2 10s3-5.5 8-5.5S18 10 18 10s-3 5.5-8 5.5S2 10 2 10z"/><circle cx="10" cy="10" r="2.3"/><path d="M3 3l14 14"/></svg>';

      function togglePw(id, btn) {
        var input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        btn.innerHTML = input.type === "password" ? EYE_OPEN : EYE_CLOSED;
      }

      function checkStrength(val) {
        var fill = document.getElementById("strength-fill");
        var label = document.getElementById("strength-label");
        if (!val) {
          fill.style.width = "0%";
          fill.style.background = "var(--border)";
          label.textContent = "Enter a password";
          return;
        }
        var score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        var levels = [
          { pct: "25%", color: "#ef4444", label: "Weak password" },
          { pct: "50%", color: "#f59e0b", label: "Fair password" },
          { pct: "75%", color: "#10b981", label: "Good password" },
          { pct: "100%", color: "#059669", label: "Strong password" },
        ];
        var lvl = levels[Math.max(0, Math.min(score, 4) - 1)];
        fill.style.width = lvl.pct;
        fill.style.background = lvl.color;
        label.textContent = lvl.label;
      }

      function handleSubmit(e) {
        e.preventDefault();
        var password = document.getElementById("password").value;
        var confirm = document.getElementById("confirm-password").value;
        if (password !== confirm) {
          alert("Passwords do not match.");
          return;
        }
        var fname = document.getElementById("fname").value.trim();
        var lname = document.getElementById("lname").value.trim();
        var email = document.getElementById("email").value.trim();
        sessionStorage.setItem("userName", fname + " " + lname);
        sessionStorage.setItem("userEmail", email);
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
